    <script type="text/javascript">

        //取得链接传入参数的值
        function getUrlParam(name) {
            var reg = new RegExp("(^|&)" + name + "=([^&]*)(&|$)");
            var r = window.location.search.substr(1).match(reg);

            if (r != null)
                return unescape(r[2]);
            return null;
        }

        function redirectHomePage() {

            var url = window.location.host;

            if (url.toLowerCase() == "www.ourpm.net") {

                window.location.href = "http://www.ourpm.net/error.html";

            }
            else {

                var targetProduct = getUrlParam("TargetProduct");

                var targetLangCode = getUrlParam("TargetLangCode");
                if (targetLangCode == null || targetLangCode == '') {
                    if (isChineseSystemLanguage()) {
                        targetLangCode = 'zh-CN';

                    } else {
                        targetLangCode = 'en';

                    }
                }

                if (targetProduct == null || targetProduct == '') {
                    var varSrc = 'https://www.taketopits.com/TDSite/Logo/WebSite/Page/TakeTopSiteDefaultLeftRight_TakeTopSoft.aspx?TargetLangCode=' + targetLangCode;

                }
                else {
                    var varSrc = 'https://www.taketopits.com/TDSite/Logo/WebSite/Page/TakeTopSiteDefaultLeftRight_TakeTopSoft.aspx?TargetLangCode=' + targetLangCode + '&TargetProduct=' + targetProduct;
                }


                this.document.getElementById("iFrameSite").src = varSrc;

                if (targetLangCode === 'zh-CN') {
                    // 直接设置文档标题
                    document.title = "项目管理软件和咨询服务提供商-泰顶拓鼎首页";
                } else {
                    // 直接设置文档标题
                    document.title = "Project Management Software & Consulting Services Provider - TakeTop";
                }
            }

        }

        // 检查用户系统语言是否为中文
        function isChineseSystemLanguage() {
            // 获取浏览器语言设置
            const userLanguage = navigator.language || navigator.userLanguage;

            // 检查是否为中文变体
            const chineseVariants = [
                'zh', 'zh-CN', 'zh-HK', 'zh-MO', 'zh-SG', 'zh-TW', 'zh-Hans', 'zh-Hant'
            ];

            // 检查语言是否以中文变体开头
            return chineseVariants.some(lang => userLanguage.toLowerCase().startsWith(lang.toLowerCase()));
        }

        // 根据系统语言设置网站语言
        function setLanguageBySystem() {
            if (isChineseSystemLanguage()) {

                setLanguage('zh-CN');
            } else {

                setLanguage('en');
            }
        }
    </script>
