<html><head><meta http-equiv="Content-Type" content="text/html; charset=utf-8" /><meta http-equiv="Content-Style-Type" content="text/css" /><meta name="generator" content="Aspose.Words for .NET 16.7.0.0" /><title></title></head><body><div><p style="margin-top:0pt; margin-bottom:12pt; font-size:12pt"><span style="font-family:'MS UI Gothic'">第一</span><span style="font-family:SimSun">阶</span><span style="font-family:'MS UI Gothic'">段:先上</span><span style="font-family:SimSun">线</span><span style="font-family:'MS UI Gothic'">科室</span><span style="font-family:SimSun">绩</span><span style="font-family:'MS UI Gothic'">效下</span><span style="font-family:SimSun">发</span><span style="font-family:'MS UI Gothic'">，二次分配，</span><span style="font-family:SimSun">银</span><span style="font-family:'MS UI Gothic'">行</span><span style="font-family:SimSun">发</span><span style="font-family:'MS UI Gothic'">放表，上</span><span style="font-family:SimSun">传</span><span style="font-family:'MS UI Gothic'">市局</span><span style="font-family:SimSun">报</span><span style="font-family:'MS UI Gothic'">表，凭</span><span style="font-family:SimSun">证</span><span style="font-family:'MS UI Gothic'">生成五</span><span style="font-family:SimSun">项</span><span style="font-family:'MS UI Gothic'">功能。</span></p><p style="margin-top:12pt; margin-bottom:12pt; font-size:12pt"><span style="font-family:'MS UI Gothic'">第二</span><span style="font-family:SimSun">阶</span><span style="font-family:'MS UI Gothic'">段:数据抓取。包括</span><span style="font-family:'Times New Roman'">HIS</span><span style="font-family:'MS UI Gothic'">，手麻系</span><span style="font-family:SimSun">统</span><span style="font-family:'MS UI Gothic'">，</span><span style="font-family:SimSun">质</span><span style="font-family:'MS UI Gothic'">控系</span><span style="font-family:SimSun">统</span><span style="font-family:'MS UI Gothic'">，人事系</span><span style="font-family:SimSun">统</span><span style="font-family:'MS UI Gothic'">等取数，并</span><span style="font-family:SimSun">对</span><span style="font-family:'MS UI Gothic'">数据清晰加工成符合</span><span style="font-family:SimSun">绩</span><span style="font-family:'MS UI Gothic'">效核算的条件数据。</span></p><p style="margin-top:0pt; margin-bottom:0pt; font-size:11pt"><span style="font-family:'微软雅黑'; color:#080f17">第三阶段:绩效项目的自动核算。争对相对稳定的绩效项目，系统进行自动核算绩效</span><span style="font-family:'微软雅黑'; color:#c21c13">，并形成报表（如每月科室核算情况报表，每个核算科室绩效历史账套等）。</span></p></div></body></html>
